<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" fill="none">
  <!-- Time axis -->
  <line x1="50" y1="220" x2="570" y2="220" stroke="#7C8493" stroke-width="0.8" opacity="0.4"/>
  <text x="50" y="240" fill="#7C8493" font-family="system-ui,sans-serif" font-size="9" opacity="0.5">t₀</text>
  <text x="560" y="240" fill="#7C8493" font-family="system-ui,sans-serif" font-size="9" text-anchor="end" opacity="0.5">t_end</text>
  <!-- Fold labels -->
  <text x="25" y="52" fill="#7C8493" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle" opacity="0.6">F1</text>
  <text x="25" y="97" fill="#7C8493" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle" opacity="0.6">F2</text>
  <text x="25" y="142" fill="#7C8493" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle" opacity="0.6">F3</text>
  <text x="25" y="187" fill="#7C8493" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle" opacity="0.6">F4</text>
  <!-- Fold 1: short train, test -->
  <rect x="50" y="40" width="100" height="22" rx="3" fill="#2D75B8" opacity="0.7"/>
  <rect x="155" y="40" width="8" height="22" rx="1" fill="#D4513E" opacity="0.6"/>
  <rect x="168" y="40" width="50" height="22" rx="3" fill="#7C8493" opacity="0.45"/>
  <!-- Fold 2: expanding train, test -->
  <rect x="50" y="85" width="170" height="22" rx="3" fill="#2D75B8" opacity="0.7"/>
  <rect x="225" y="85" width="8" height="22" rx="1" fill="#D4513E" opacity="0.6"/>
  <rect x="238" y="85" width="55" height="22" rx="3" fill="#7C8493" opacity="0.45"/>
  <!-- Fold 3: more expanding train, test -->
  <rect x="50" y="130" width="250" height="22" rx="3" fill="#2D75B8" opacity="0.7"/>
  <rect x="305" y="130" width="8" height="22" rx="1" fill="#D4513E" opacity="0.6"/>
  <rect x="318" y="130" width="60" height="22" rx="3" fill="#7C8493" opacity="0.45"/>
  <!-- Fold 4: largest train, test -->
  <rect x="50" y="175" width="340" height="22" rx="3" fill="#2D75B8" opacity="0.7"/>
  <rect x="395" y="175" width="8" height="22" rx="1" fill="#D4513E" opacity="0.6"/>
  <rect x="408" y="175" width="65" height="22" rx="3" fill="#7C8493" opacity="0.45"/>
  <!-- Legend -->
  <rect x="50" y="210" width="10" height="4" rx="1" fill="#2D75B8" opacity="0.7"/>
  <text x="65" y="214" fill="#7C8493" font-family="system-ui,sans-serif" font-size="8" opacity="0.6">Train</text>
  <rect x="105" y="210" width="10" height="4" rx="1" fill="#D4513E" opacity="0.6"/>
  <text x="120" y="214" fill="#7C8493" font-family="system-ui,sans-serif" font-size="8" opacity="0.6">Embargo</text>
  <rect x="175" y="210" width="10" height="4" rx="1" fill="#7C8493" opacity="0.45"/>
  <text x="190" y="214" fill="#7C8493" font-family="system-ui,sans-serif" font-size="8" opacity="0.6">Test</text>
  <!-- Expanding arrow indicator -->
  <line x1="45" y1="45" x2="45" y2="192" stroke="#2D75B8" stroke-width="0.6" opacity="0.3"/>
  <polyline points="43,188 45,195 47,188" stroke="#2D75B8" stroke-width="0.6" opacity="0.3" fill="none"/>
</svg>
