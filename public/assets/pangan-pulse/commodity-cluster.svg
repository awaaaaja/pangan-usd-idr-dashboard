<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Chili pepper — geometric abstraction -->
  <g transform="translate(60,60)">
    <path d="M30,10 Q50,0 55,20 Q60,50 45,80 Q35,95 25,80 Q10,50 15,20 Q18,5 30,10Z" fill="#D4513E" opacity="0.85"/>
    <path d="M30,10 Q32,0 35,5 Q33,12 30,10Z" fill="#2D7E67" opacity="0.7"/>
    <line x1="32" y1="25" x2="35" y2="65" stroke="#D4513E" stroke-width="0.6" opacity="0.4"/>
  </g>
  <!-- Garlic/onion bulb — concentric arcs -->
  <g transform="translate(175,100)">
    <ellipse cx="35" cy="40" rx="32" ry="36" fill="#D8CEBA" opacity="0.6"/>
    <ellipse cx="35" cy="40" rx="22" ry="26" fill="none" stroke="#D8CEBA" stroke-width="1.2" opacity="0.8"/>
    <ellipse cx="35" cy="40" rx="12" ry="16" fill="none" stroke="#D8CEBA" stroke-width="1" opacity="0.6"/>
    <path d="M35,4 Q37,0 35,8" stroke="#2D7E67" stroke-width="1.5" fill="none" opacity="0.5"/>
    <line x1="35" y1="4" x2="33" y2="-5" stroke="#2D7E67" stroke-width="1" opacity="0.4"/>
    <line x1="35" y1="4" x2="38" y2="-4" stroke="#2D7E67" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Rice grains — scattered geometric -->
  <g transform="translate(290,70)">
    <ellipse cx="20" cy="20" rx="6" ry="14" transform="rotate(-15,20,20)" fill="#D8CEBA" opacity="0.7"/>
    <ellipse cx="45" cy="30" rx="5.5" ry="13" transform="rotate(10,45,30)" fill="#D8CEBA" opacity="0.6"/>
    <ellipse cx="30" cy="55" rx="5" ry="12" transform="rotate(-5,30,55)" fill="#D8CEBA" opacity="0.65"/>
    <ellipse cx="55" cy="60" rx="5.5" ry="13" transform="rotate(20,55,60)" fill="#D8CEBA" opacity="0.55"/>
    <ellipse cx="15" cy="50" rx="5" ry="11" transform="rotate(-25,15,50)" fill="#D8CEBA" opacity="0.5"/>
  </g>
  <!-- Connecting data dots between commodities -->
  <circle cx="110" cy="120" r="2.5" fill="#2D7E67" opacity="0.5"/>
  <circle cx="155" cy="130" r="2" fill="#2D7E67" opacity="0.4"/>
  <circle cx="250" cy="120" r="2.5" fill="#2D7E67" opacity="0.5"/>
  <circle cx="280" cy="110" r="2" fill="#2D7E67" opacity="0.4"/>
  <line x1="110" y1="120" x2="155" y2="130" stroke="#2D7E67" stroke-width="0.6" opacity="0.3" stroke-dasharray="3 2"/>
  <line x1="250" y1="120" x2="280" y2="110" stroke="#2D7E67" stroke-width="0.6" opacity="0.3" stroke-dasharray="3 2"/>
  <!-- Bottom label bars -->
  <rect x="55" y="230" width="60" height="4" rx="2" fill="#D4513E" opacity="0.5"/>
  <rect x="175" y="230" width="60" height="4" rx="2" fill="#D8CEBA" opacity="0.5"/>
  <rect x="295" y="230" width="60" height="4" rx="2" fill="#D8CEBA" opacity="0.4"/>
  <!-- Subtle data ticks -->
  <g stroke="#1C273B" stroke-width="0.5" opacity="0.2">
    <line x1="55" y1="245" x2="115" y2="245"/>
    <line x1="175" y1="245" x2="235" y2="245"/>
    <line x1="295" y1="245" x2="355" y2="245"/>
  </g>
</svg>
